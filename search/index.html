---
layout: default
title: 搜索
description: 搜索 Galaxy-A Blog 内容。
---
{% include site-header.html %}
<main class="shell blog-layout">
  <section class="search-main">
    <header class="archive-head">
      <h1>搜索</h1>
      <p>输入关键词筛选文章、笔记和公开资料。</p>
    </header>
    <div class="search-box">
      <input id="searchInput" type="search" placeholder="搜索文章、笔记、资料、标签……" autocomplete="off" />
      <select id="typeFilter" aria-label="内容类型筛选">
        <option value="all">全部</option>
        <option value="post">文章</option>
        <option value="knowledge">笔记</option>
        <option value="file">资料</option>
      </select>
    </div>
    <div id="tagCloud" class="tag-cloud" aria-label="标签筛选"></div>
    <div id="postList" class="search-result-list"></div>
  </section>

  {% include sidebar.html %}
</main>

<template id="cardTemplate">
  <article class="search-result-card">
    <h2><a class="post-title"></a></h2>
    <div class="post-meta"></div>
    <p></p>
    <div class="card-tags"></div>
    <a class="read-more">阅读全文</a>
  </article>
</template>
